name: The Clinic App CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic
          POSTGRES_DB: clinicdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://clinic:clinic@localhost:5432/clinicdb
          SECRET_KEY: test-secret-key-ci
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Seed database
        env:
          DATABASE_URL: postgresql://clinic:clinic@localhost:5432/clinicdb
          SECRET_KEY: test-secret-key-ci
        run: |
          cd backend
          python -m scripts.seed_db

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://clinic:clinic@localhost:5432/clinicdb
          SECRET_KEY: test-secret-key-ci
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t clinic-backend:ci

      - name: Validate docker-compose
        run: docker compose config
