<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Clinic App — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        The Clinic<span>App</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
        <a href="/appointments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Appointments</span></a>
        <a href="/doctors.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Doctors</span></a>
        <a href="/admin.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Admin</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">?</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Loading…</div>
            <div class="user-role" id="sidebar-user-role"></div>
          </div>
        </div>
        <button class="btn-logout" id="btn-logout">Sign out</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">Admin Panel</div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">User Management</h1>
            <p class="page-subtitle">Manage all users in the system</p>
          </div>
        </div>

        <div id="alert-container"></div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--gray-500)">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireRole('admin');
    initSidebar();

    const currentUser = Auth.getUser();
    let currentPage = 1;

    async function loadUsers(page = 1) {
      currentPage = page;
      const tbody = document.getElementById('users-table-body');
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--gray-500)">Loading…</td></tr>';

      try {
        const data = await api.listUsers(page, 20);

        tbody.innerHTML = data.items.map(u => `
          <tr data-testid="user-row-${u.id}">
            <td>${u.id}</td>
            <td>${u.full_name}</td>
            <td>${u.email}</td>
            <td>${roleBadge(u.role)}</td>
            <td>
              <span class="badge ${u.is_active ? 'badge-confirmed' : 'badge-cancelled'}">
                ${u.is_active ? 'Active' : 'Inactive'}
              </span>
            </td>
            <td>${new Date(u.created_at).toLocaleDateString()}</td>
            <td>
              ${u.id !== currentUser.id ? `
                <button class="btn btn-danger btn-sm"
                  data-testid="deactivate-btn-${u.id}"
                  data-user-id="${u.id}"
                  data-user-name="${u.full_name.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"
                  ${!u.is_active ? 'disabled title="Already inactive"' : ''}>
                  Deactivate
                </button>
              ` : '<span style="color:var(--gray-500);font-size:.8rem">You</span>'}
            </td>
          </tr>
        `).join('');

        renderPagination(data.page, data.pages);
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="alert alert-error">${err.message}</div></td></tr>`;
      }
    }

    async function deactivateUser(id, name) {
      if (!confirm(`Deactivate ${name}? They will no longer be able to log in.`)) return;
      try {
        await api.deleteUser(id);
        showAlert('alert-container', `${name} has been deactivated.`, 'success');
        loadUsers(currentPage);
      } catch (err) {
        showAlert('alert-container', err.message);
      }
    }

    function renderPagination(page, pages) {
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      el.innerHTML = `
        <button class="page-btn" onclick="loadUsers(${page-1})" ${page===1?'disabled':''}>‹ Prev</button>
        <span class="page-info">Page ${page} of ${pages}</span>
        <button class="page-btn" onclick="loadUsers(${page+1})" ${page===pages?'disabled':''}>Next ›</button>
      `;
    }

    document.getElementById('users-table-body').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-user-id]');
      if (!btn || btn.disabled) return;
      const id = parseInt(btn.dataset.userId, 10);
      const name = btn.dataset.userName;
      deactivateUser(id, name);
    });

    loadUsers();
  </script>
</body>
</html>
