<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Clinic App — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>The Clinic<span>App</span></h1>
        <p>Clinic Appointment Management Platform</p>
      </div>

      <div id="alert-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
            data-testid="email-input"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            data-testid="password-input"
          />
        </div>
        <button type="submit" class="btn btn-primary btn-full" data-testid="login-btn">
          Sign in
        </button>
      </form>

      <p style="text-align:center; margin-top:16px; font-size:.875rem; color:var(--gray-500)">
        New patient?
        <a href="/register.html" data-testid="register-link">Create account</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const btn = e.target.querySelector('[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      document.getElementById('alert-container').innerHTML = '';

      try {
        const tokens = await api.login(email, password);
        const user = await api.getMe();
        Auth.save(tokens.access_token, user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert('alert-container', err.message);
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
