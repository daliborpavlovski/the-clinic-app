<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Clinic App — Appointments</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        The Clinic<span>App</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
        <a href="/appointments.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Appointments</span></a>
        <a href="/doctors.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Doctors</span></a>
        <a href="/admin.html" class="nav-item" data-role="admin" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Admin</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">?</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Loading…</div>
            <div class="user-role" id="sidebar-user-role"></div>
          </div>
        </div>
        <button class="btn-logout" id="btn-logout">Sign out</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">Appointments</div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">Appointments</h1>
            <p class="page-subtitle" id="appt-subtitle">Manage your appointments</p>
          </div>
          <button class="btn btn-primary" id="btn-new-appt" data-testid="new-appointment-btn">
            + New Appointment
          </button>
        </div>

        <div id="alert-container"></div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Date / Time</th>
                <th>Doctor</th>
                <th>Patient</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="appt-table-body">
              <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--gray-500)">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>

  <!-- Book Appointment Modal -->
  <div class="modal-overlay hidden" id="modal-book" data-testid="book-modal">
    <div class="modal">
      <div class="modal-title">Book Appointment</div>
      <div id="modal-alert"></div>
      <form id="book-form">
        <div class="form-group">
          <label class="form-label">Doctor</label>
          <select id="select-doctor" class="form-input form-select" required data-testid="doctor-select">
            <option value="">Select a doctor…</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Start Time</label>
          <input type="datetime-local" id="start-time" class="form-input" required data-testid="start-time-input" />
        </div>
        <div class="form-group">
          <label class="form-label">End Time</label>
          <input type="datetime-local" id="end-time" class="form-input" required data-testid="end-time-input" />
        </div>
        <div class="form-group">
          <label class="form-label">Reason (optional)</label>
          <input type="text" id="reason" class="form-input" placeholder="Brief reason for visit" data-testid="reason-input" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" data-testid="confirm-book-btn">Book Appointment</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireAuth();
    initSidebar();

    const user = Auth.getUser();
    let currentPage = 1;

    if (user.role === 'doctor') {
      document.getElementById('btn-new-appt').style.display = 'none';
      document.getElementById('appt-subtitle').textContent = 'Your patient appointments';
    }
    if (user.role === 'admin') {
      document.getElementById('appt-subtitle').textContent = 'All clinic appointments';
    }

    async function loadAppointments(page = 1) {
      currentPage = page;
      const tbody = document.getElementById('appt-table-body');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--gray-500)">Loading…</td></tr>';

      try {
        const data = await api.listAppointments(page, 20);
        if (!data.items.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--gray-500)">No appointments found.</td></tr>';
          return;
        }

        tbody.innerHTML = data.items.map(a => `
          <tr data-id="${a.id}">
            <td>${formatDate(a.start_time)}</td>
            <td>Dr. #${a.doctor_id}</td>
            <td>Patient #${a.patient_id}</td>
            <td>${a.reason || '—'}</td>
            <td>${statusBadge(a.status)}</td>
            <td>
              ${canCancel(a) ? `<button class="btn btn-danger btn-sm" data-action="cancel" data-id="${a.id}" data-testid="cancel-btn-${a.id}">Cancel</button>` : ''}
              ${canConfirm(a) ? `<button class="btn btn-success btn-sm" data-action="confirm" data-id="${a.id}" data-testid="confirm-btn-${a.id}">Confirm</button>` : ''}
              ${canComplete(a) ? `<button class="btn btn-primary btn-sm" data-action="complete" data-id="${a.id}">Complete</button>` : ''}
            </td>
          </tr>
        `).join('');

        renderPagination(data.page, data.pages);
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--gray-500)">Failed to load appointments.</td></tr>';
        showAlert('alert-container', err.message);
      }
    }

    function canCancel(a) {
      if (a.status === 'completed' || a.status === 'cancelled') return false;
      if (user.role === 'patient') return a.patient_id === user.id;
      return user.role === 'doctor' || user.role === 'admin';
    }
    function canConfirm(a) {
      return a.status === 'pending' && (user.role === 'doctor' || user.role === 'admin');
    }
    function canComplete(a) {
      return a.status === 'confirmed' && (user.role === 'doctor' || user.role === 'admin');
    }

    async function cancelAppt(id) {
      if (!confirm('Cancel this appointment?')) return;
      try {
        await api.updateStatus(id, 'cancelled');
        loadAppointments(currentPage);
      } catch (err) {
        showAlert('alert-container', err.message);
      }
    }

    async function confirmAppt(id) {
      try {
        await api.updateStatus(id, 'confirmed');
        loadAppointments(currentPage);
      } catch (err) {
        showAlert('alert-container', err.message);
      }
    }

    async function completeAppt(id) {
      try {
        await api.updateStatus(id, 'completed');
        loadAppointments(currentPage);
      } catch (err) {
        showAlert('alert-container', err.message);
      }
    }

    function renderPagination(page, pages) {
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      el.innerHTML = `
        <button class="page-btn" onclick="loadAppointments(${page-1})" ${page===1?'disabled':''}>‹ Prev</button>
        <span class="page-info">Page ${page} of ${pages}</span>
        <button class="page-btn" onclick="loadAppointments(${page+1})" ${page===pages?'disabled':''}>Next ›</button>
      `;
    }

    // Action buttons (cancel / confirm / complete) via event delegation
    document.getElementById('appt-table-body').addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const id = parseInt(btn.dataset.id, 10);
      const action = btn.dataset.action;
      if (action === 'cancel') await cancelAppt(id);
      else if (action === 'confirm') await confirmAppt(id);
      else if (action === 'complete') await completeAppt(id);
    });

    // Book modal
    document.getElementById('btn-new-appt').addEventListener('click', async () => {
      document.getElementById('modal-book').classList.remove('hidden');
      document.getElementById('modal-alert').innerHTML = '';

      // Load doctors
      const select = document.getElementById('select-doctor');
      select.innerHTML = '<option value="">Loading doctors…</option>';
      try {
        const data = await api.listDoctors(1, 50);
        select.innerHTML = '<option value="">Select a doctor…</option>' +
          data.items.map(d => `<option value="${d.user_id}">${d.doctor_name || 'Doctor'} — ${d.specialty}</option>`).join('');
      } catch {
        select.innerHTML = '<option value="">Failed to load doctors</option>';
      }

      // Set default start/end (tomorrow at 10am)
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(10, 0, 0, 0);
      const end = new Date(tomorrow);
      end.setMinutes(end.getMinutes() + 30);
      document.getElementById('start-time').value = toLocalIso(tomorrow);
      document.getElementById('end-time').value = toLocalIso(end);
    });

    function toLocalIso(d) {
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    document.getElementById('btn-close-modal').addEventListener('click', () => {
      document.getElementById('modal-book').classList.add('hidden');
    });

    document.getElementById('book-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const doctorId = parseInt(document.getElementById('select-doctor').value);
      const startTime = new Date(document.getElementById('start-time').value).toISOString();
      const endTime = new Date(document.getElementById('end-time').value).toISOString();
      const reason = document.getElementById('reason').value.trim() || null;

      try {
        await api.createAppointment({ doctor_id: doctorId, start_time: startTime, end_time: endTime, reason });
        document.getElementById('modal-book').classList.add('hidden');
        showAlert('alert-container', 'Appointment booked successfully!', 'success');
        loadAppointments(1);
      } catch (err) {
        showAlert('modal-alert', err.message);
      }
    });

    loadAppointments();
  </script>
</body>
</html>
