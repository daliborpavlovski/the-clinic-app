<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Clinic App — Doctors</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        The Clinic<span>App</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
        <a href="/appointments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Appointments</span></a>
        <a href="/doctors.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Doctors</span></a>
        <a href="/admin.html" class="nav-item" data-role="admin" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Admin</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">?</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Loading…</div>
            <div class="user-role" id="sidebar-user-role"></div>
          </div>
        </div>
        <button class="btn-logout" id="btn-logout">Sign out</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">Doctors</div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">Our Doctors</h1>
            <p class="page-subtitle">Browse specialists and their availability</p>
          </div>
        </div>

        <div id="doctors-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
          <div class="loading-state"><div class="spinner"></div> Loading…</div>
        </div>

        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>

  <!-- Doctor Slots Modal -->
  <div class="modal-overlay hidden" id="modal-slots">
    <div class="modal" style="max-width:540px">
      <div class="modal-title" id="slots-title">Available Slots</div>
      <div id="slots-content" style="max-height:400px;overflow-y:auto"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-slots').classList.add('hidden')">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireAuth();
    initSidebar();

    async function loadDoctors(page = 1) {
      const grid = document.getElementById('doctors-grid');
      grid.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';

      try {
        const data = await api.listDoctors(page, 12);

        if (!data.items.length) {
          grid.innerHTML = '<p style="color:var(--gray-500)">No doctors found.</p>';
          return;
        }

        grid.innerHTML = data.items.map(d => `
          <div class="card" data-testid="doctor-card-${d.user_id}">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div class="user-avatar" style="width:48px;height:48px;font-size:1.1rem;background:var(--accent)">
                ${(d.doctor_name || 'D').split(' ').map(n=>n[0]).slice(0,2).join('')}
              </div>
              <div>
                <div style="font-weight:600">${d.doctor_name || 'Unknown'}</div>
                <div style="font-size:.85rem;color:var(--gray-500)">${d.specialty}</div>
              </div>
            </div>
            <p style="font-size:.875rem;color:var(--gray-700);margin-bottom:12px">${d.bio || 'No bio provided.'}</p>
            <div style="font-size:.8rem;color:var(--gray-500);margin-bottom:12px">
              Slot duration: ${d.slot_duration_minutes} min
            </div>
            <button class="btn btn-secondary btn-sm"
              data-testid="view-slots-btn-${d.user_id}"
              data-doctor-id="${d.user_id}"
              data-doctor-name="${(d.doctor_name || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">
              View Available Slots
            </button>
          </div>
        `).join('');

        renderPagination(data.page, data.pages);
      } catch (err) {
        grid.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    async function showSlots(doctorId, name) {
      document.getElementById('slots-title').textContent = `${name} — Available Slots`;
      document.getElementById('slots-content').innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
      document.getElementById('modal-slots').classList.remove('hidden');

      try {
        const slots = await api.getDoctorSlots(doctorId);
        const available = slots.filter(s => s.available);

        if (!available.length) {
          document.getElementById('slots-content').innerHTML = '<p style="padding:16px;color:var(--gray-500)">No available slots in the next 7 days.</p>';
          return;
        }

        document.getElementById('slots-content').innerHTML = available.slice(0, 20).map(s => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid var(--gray-100)">
            <span style="font-size:.9rem">${formatDate(s.start_time)}</span>
            <a href="/appointments.html" class="btn btn-primary btn-sm">Book</a>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('slots-content').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function renderPagination(page, pages) {
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      el.innerHTML = `
        <button class="page-btn" onclick="loadDoctors(${page-1})" ${page===1?'disabled':''}>‹ Prev</button>
        <span class="page-info">Page ${page} of ${pages}</span>
        <button class="page-btn" onclick="loadDoctors(${page+1})" ${page===pages?'disabled':''}>Next ›</button>
      `;
    }

    document.getElementById('doctors-grid').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-doctor-id]');
      if (!btn) return;
      showSlots(parseInt(btn.dataset.doctorId, 10), btn.dataset.doctorName);
    });

    loadDoctors();
  </script>
</body>
</html>
