version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexusdb
      SECRET_KEY: ${SECRET_KEY:-nexus-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost", "http://localhost:80", "http://localhost:8080"]'
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
      DOCTOR_PASSWORD: ${DOCTOR_PASSWORD:-Doctor1234!}
      PATIENT_PASSWORD: ${PATIENT_PASSWORD:-Patient1234!}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: nginx:1.25-alpine
    container_name: nexus-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:

networks:
  default:
    name: nexus-network
